<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep Space Aura Gradient -->
    <radialGradient id="darkAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9d00ff" stop-opacity="0.9" />
      <stop offset="40%" stop-color="#4a0080" stop-opacity="0.8" />
      <stop offset="80%" stop-color="#140024" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#05000a" stop-opacity="1" />
    </radialGradient>
    
    <!-- Sinister Eye Glow -->
    <filter id="yandereGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="115" fill="url(#darkAura)" />

  <!-- Wispy Aura Elements in Background -->
  <path d="M 50 400 Q 150 150 256 100 Q 360 150 462 400 Z" fill="#6a0080" opacity="0.4" filter="blur(15px)" />
  <path d="M 100 450 Q 200 200 256 150 Q 312 200 412 450 Z" fill="#b800e6" opacity="0.2" filter="blur(20px)" />

  <!-- Detailed Yandere Silhouette -->
  <path d="M 256 130 
           C 190 130 160 210 150 270 
           C 130 300 110 350 110 400 
           L 80 512 
           L 432 512 
           L 402 400 
           C 402 350 382 300 362 270 
           C 352 210 322 130 256 130 Z" 
        fill="#000000" />

  <!-- Hair Spikes/Strands -->
  <path d="M 180 180 Q 110 220 130 290 Q 150 250 170 230 Z" fill="#000000" />
  <path d="M 332 180 Q 402 220 382 290 Q 362 250 342 230 Z" fill="#000000" />
  <path d="M 256 130 Q 210 80 170 150 Q 210 110 256 130 Z" fill="#000000" />
  <path d="M 256 130 Q 302 80 342 150 Q 302 110 256 130 Z" fill="#000000" />

  <!-- Glowing Red Eyes -->
  <g filter="url(#yandereGlow)">
    <path d="M 190 280 Q 220 260 240 280 Q 220 290 190 280 Z" fill="#ff0000" />
    <path d="M 322 280 Q 292 260 272 280 Q 292 290 322 280 Z" fill="#ff0000" />
  </g>

  <!-- Piercing White Pupils -->
  <circle cx="215" cy="278" r="3" fill="#ffffff" />
  <circle cx="297" cy="278" r="3" fill="#ffffff" />
</svg>
